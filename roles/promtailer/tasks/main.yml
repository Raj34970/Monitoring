# --- Promtail ---
- name: Configure Promtail
  tags:
    - never
    - promtail
    - install_all
  block:
    - name: Template Promtail config
      ansible.builtin.template:
        src: promtail.yml.j2
        dest: "/opt/loki/promtail.yml"
        mode: '0644'
      loop:
        - { src: "promtail.yml.j2", dest: "/opt/loki/promtail.yml" }
        - { src: "promtail.service.j2", dest: "/etc/systemd/system/promtail.service" }

    - name: Enable and start Promtail
      ansible.builtin.systemd:
        name: promtail
        enabled: true
        state: started
