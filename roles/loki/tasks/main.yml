# --- Loki ---
- name: Configure Loki
  tags:
    - never
    - loki
    - install_all
  block:
    - name: Unzip Loki
      ansible.builtin.unarchive:
        src: "{{ loki_url }}"
        dest: "/opt/loki"
        remote_src: true

    - name: Template Loki config
      ansible.builtin.template:
        src: loki.yml.j2
        dest: "/opt/loki/loki.yml"
        mode: '0644'
      loop:
        - { src: "loki.yml.j2", dest: "/opt/loki/loki.yml" }
        - { src: "loki.service.j2", dest: "/etc/systemd/system/loki.service" }

    - name: Enable and start Loki
      ansible.builtin.systemd:
        name: loki
        enabled: true
        state: started
